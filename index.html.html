<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Correio — Alavan</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(150deg,#F4EFE6 0%,#EAE3D8 50%,#E2DACE 100%);min-height:100vh;font-family:'Nunito',sans-serif}
input,textarea,select{font-family:'Nunito',sans-serif;font-size:14px;color:#1C1917;background:#FAFAF9;border:2px solid #E8E0D5;border-radius:10px;padding:11px 13px;width:100%;outline:none;transition:border 0.2s}
input:focus,textarea:focus,select:focus{border-color:#1C1917}
textarea{resize:vertical;line-height:1.7}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite;display:inline-block}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const GRAPH="https://graph.microsoft.com/v1.0";
const SCOPES=["Mail.Read","Mail.ReadWrite","Mail.Send","User.Read"];
const GEMINI_MODEL="gemini-2.0-flash";
const GEMINI_URL=`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`;

const FISCAL_SYSTEM=`És uma especialista sénior em direito fiscal português e assessora certificada pela Ordem dos Contabilistas Certificados (OCC). Respondes sempre em português de Portugal com linguagem profissional e rigorosa.

ÁREAS DE ESPECIALIZAÇÃO:
• IVA: CIVA, Regime de IVA de Caixa, operações intracomunitárias (RITI), isenções completas e incompletas, inversão do sujeito passivo, regularizações
• IRC: CIRC, tributação de grupos (RETGS), benefícios fiscais (RFAI, SIFIDE, DLRR), gastos dedutíveis, preços de transferência (art.63.º CIRC), tributação de mais-valias
• IRS: CIRS, categorias A a H, retenções na fonte, englobamento, mais-valias mobiliárias e imobiliárias, residentes não habituais (RNH/IFICI)
• IMT: CIMT, isenções (habitação própria permanente, reabilitação urbana), valor tributável, substituição tributária
• CE/Relações Internacionais: Convenções para Evitar a Dupla Tributação (CDT), Diretiva Mães-Filhas, Diretiva Juros e Royalties, ATAD I e II, BEPS, Modelo OCDE

AO REDIGIR RESPOSTAS:
1. Responde de forma direta e objetiva
2. Fundamenta com artigos específicos: "nos termos do art.º X.º do CIVA/CIRC/CIRS/CIMT..."
3. Referencia Informações Vinculativas da AT quando relevante
4. Cita Pareceres e Orientações da OCC quando aplicável
5. Indica obrigações declarativas e prazos legais se existirem
6. Alerta para riscos fiscais se detetares
FORMATO: resposta objetiva → fundamentação legal → referências AT/OCC → alertas`;

const DEMO_EMAILS=[
  {id:"d1",subject:"Dúvida sobre IVA intracomunitário — aquisição serviços Espanha",from:{emailAddress:{name:"Carlos Mendes",address:"c.mendes@cliente.pt"}},toRecipients:[{emailAddress:{address:"gbarbosa@alavan.pt"}}],ccRecipients:[],receivedDateTime:new Date(Date.now()-1800000).toISOString(),bodyPreview:"Bom dia Dra. Gisela, venho solicitar esclarecimento sobre a dedutibilidade do IVA numa aquisição intracomunitária de serviços de consultoria a fornecedor espanhol, no valor de 15.000€. A nossa empresa é sujeito passivo de IVA em Portugal. Aguardo orientação.",webLink:"#",isDirect:true},
  {id:"d2",subject:"Revisão contrato prestação de serviços — urgente",from:{emailAddress:{name:"Ana Rodrigues",address:"ana.r@empresa.pt"}},toRecipients:[{emailAddress:{address:"gbarbosa@alavan.pt"}}],ccRecipients:[],receivedDateTime:new Date(Date.now()-7200000).toISOString(),bodyPreview:"Gisela, em anexo segue a versão revista do contrato conforme acordado. Confirma se os termos da cláusula 7 relativa à facturação estão corretos. Precisamos de fechar até sexta.",webLink:"#",isDirect:true},
  {id:"d3",subject:"Prazo entrega Modelo 22 IRC 2024",from:{emailAddress:{name:"Portal das Finanças",address:"noreply@portaldasfinancas.gov.pt"}},toRecipients:[{emailAddress:{address:"gbarbosa@alavan.pt"}}],ccRecipients:[],receivedDateTime:new Date(Date.now()-86400000).toISOString(),bodyPreview:"Informamos que o prazo para entrega da Declaração Modelo 22 referente ao exercício de 2024 termina a 31 de julho de 2025.",webLink:"#",isDirect:true},
  {id:"d4",subject:"Reunião de equipa — quinta 14h",from:{emailAddress:{name:"Direção Alavan",address:"direcao@alavan.pt"}},toRecipients:[],ccRecipients:[{emailAddress:{address:"gbarbosa@alavan.pt"}}],receivedDateTime:new Date(Date.now()-172800000).toISOString(),bodyPreview:"Convocam-se todos os colaboradores para reunião de equipa na quinta-feira às 14h. Ordem de trabalhos: resultados Q1, perspetivas Q2, projetos em curso.",webLink:"#",isDirect:false},
];

let msalInst=null;
const getMsal=async(clientId)=>{
  if(msalInst)return msalInst;
  const inst=new msal.PublicClientApplication({
    auth:{clientId,authority:"https://login.microsoftonline.com/common",redirectUri:window.location.href.split("?")[0].split("#")[0]},
    cache:{cacheLocation:"localStorage"}
  });
  await inst.initialize();
  try{await inst.handleRedirectPromise();}catch(e){}
  msalInst=inst;
  return inst;
};

const callGemini=async(prompt,system,apiKey)=>{
  const body={contents:[{parts:[{text:prompt}]}]};
  if(system)body.system_instruction={parts:[{text:system}]};
  const res=await fetch(`${GEMINI_URL}?key=${apiKey}`,{
    method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)
  });
  const d=await res.json();
  if(d.error)throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.[0]?.text||"";
};

function Avatar({name}){
  const i=(name||"?").split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
  const c=["#1B4332","#1E3A5F","#7F1D1D","#4A1D96","#78350F","#134E4A"];
  return <div style={{width:44,height:44,borderRadius:"50%",background:c[(name||"").charCodeAt(0)%c.length],color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:15,fontFamily:"Nunito",flexShrink:0}}>{i}</div>;
}
function PBadge({d}){return d?<span style={{background:"#FEE2E2",color:"#991B1B",padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:800}}>● DIRETO</span>:<span style={{background:"#F3F4F6",color:"#6B7280",padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:800}}>● CÓPIA</span>;}
function UBadge({u}){const c={alta:{bg:"#FEE2E2",t:"#991B1B",l:"⚠ Urgente"},media:{bg:"#FEF3C7",t:"#92400E",l:"📋 Normal"},baixa:{bg:"#D1FAE5",t:"#065F46",l:"✔ Baixa"}}[u]||{bg:"#F3F4F6",t:"#374151",l:""};return c.l?<span style={{background:c.bg,color:c.t,padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:800}}>{c.l}</span>:null;}

function Btn({onClick,disabled,bg,color="#fff",icon,label,small,loading}){
  const [h,setH]=useState(false);
  return<button onClick={onClick} disabled={disabled||loading} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
    style={{flex:1,background:disabled?"#E5E7EB":bg,color:disabled?"#9CA3AF":color,border:"none",borderRadius:11,
      padding:small?"9px 3px":"12px 4px",cursor:disabled?"not-allowed":"pointer",fontFamily:"Nunito",fontWeight:800,
      fontSize:small?10:12,display:"flex",flexDirection:"column",alignItems:"center",gap:3,transition:"all 0.15s",
      transform:h&&!disabled?"translateY(-2px)":"none",boxShadow:h&&!disabled?`0 4px 14px ${bg}55`:"none"}}>
    <span style={{fontSize:small?17:19}}>{loading?"⏳":icon}</span>
    <span style={{lineHeight:1.2,textAlign:"center"}}>{label}</span>
  </button>;
}

function App(){
  const load=()=>{try{return JSON.parse(localStorage.getItem("em_cfg2")||"{}")}catch{return{}}};
  const [cfg,setCfg]=useState({clientId:"801ae963-ece9-48b9-94a1-c01c0c8c5d6b",geminiKey:"",asanaToken:"",asanaProjectGid:"",asanaProjectName:"",...load()});
  const [screen,setScreen]=useState("setup");
  const [tab,setTab]=useState("ms");
  const [token,setToken]=useState(null);
  const [myEmail,setMyEmail]=useState("");
  const [emails,setEmails]=useState([]);
  const [idx,setIdx]=useState(0);
  const [processed,setProcessed]=useState(0);
  const [ai,setAi]=useState(null);
  const [aiLoading,setAiLoading]=useState(false);
  const [replyText,setReplyText]=useState("");
  const [replyMode,setReplyMode]=useState("general");
  const [replyLoading,setReplyLoading]=useState(false);
  const [actLoading,setActLoading]=useState(false);
  const [taskDone,setTaskDone]=useState(false);
  const [asanaProjects,setAsanaProjects]=useState([]);
  const [asanaLoading,setAsanaLoading]=useState(false);
  const [error,setError]=useState("");
  const [demo,setDemo]=useState(false);

  const save=(c)=>{setCfg(c);localStorage.setItem("em_cfg2",JSON.stringify(c));};

  const login=async()=>{
    if(!cfg.clientId.trim()){setError("Client ID em falta.");return;}
    setActLoading(true);setError("");
    try{
      const inst=await getMsal(cfg.clientId.trim());
      const r=await inst.loginPopup({scopes:SCOPES});
      const tr=await inst.acquireTokenSilent({scopes:SCOPES,account:r.account});
      setToken(tr.accessToken);
      const me=await(await fetch(`${GRAPH}/me?$select=mail,userPrincipalName`,{headers:{Authorization:`Bearer ${tr.accessToken}`}})).json();
      const em=(me.mail||me.userPrincipalName||"").toLowerCase();
      setMyEmail(em);setDemo(false);
      await loadEmails(tr.accessToken,em);
    }catch(e){
      setError(e.errorCode==="popup_window_error"||e.message?.includes("popup")
        ?"Popup bloqueado — permite popups para esta página e tenta de novo."
        :`Erro: ${e.message}`);
    }finally{setActLoading(false);}
  };

  const loadAsana=async(tok)=>{
    if(!tok)return;
    setAsanaLoading(true);
    try{
      const d=await(await fetch("https://app.asana.com/api/1.0/projects?limit=50&archived=false",{headers:{Authorization:`Bearer ${tok}`,Accept:"application/json"}})).json();
      setAsanaProjects(d.data||[]);
    }catch{}
    setAsanaLoading(false);
  };

  const startDemo=()=>{
    setDemo(true);setEmails(DEMO_EMAILS);setIdx(0);setProcessed(0);
    setScreen("emails");summarize(DEMO_EMAILS[0]);
  };

  const loadEmails=async(t,me)=>{
    setScreen("loading");
    try{
      const d=await(await fetch(`${GRAPH}/me/mailFolders/inbox/messages?$top=40&$select=id,subject,from,toRecipients,ccRecipients,receivedDateTime,bodyPreview,isRead,webLink&$orderby=receivedDateTime desc`,{headers:{Authorization:`Bearer ${t}`}})).json();
      if(d.error)throw new Error(d.error.message);
      const list=(d.value||[]).filter(e=>!e.isRead).map(e=>({
        ...e,isDirect:e.toRecipients?.some(r=>r.emailAddress?.address?.toLowerCase()===(me||myEmail))
      }));
      list.sort((a,b)=>(b.isDirect?1:0)-(a.isDirect?1:0));
      setEmails(list);setIdx(0);setProcessed(0);
      if(!list.length){setScreen("done");return;}
      setScreen("emails");summarize(list[0]);
    }catch(e){setError(`Erro: ${e.message}`);setScreen("setup");}
  };

  const summarize=async(email)=>{
    setAi(null);setAiLoading(true);
    if(!cfg.geminiKey){setAiLoading(false);return;}
    try{
      const txt=await callGemini(
        `Analisa este email. Responde APENAS com JSON válido sem markdown:\n{"resumo":"2 frases claras em português","urgencia":"alta|media|baixa","tipo":"fiscal|contrato|reuniao|fatura|pedido|informacao|newsletter|outro","acao":"arquivar|responder|responder_fiscal|tarefa|guardar"}\n\nDe: ${email.from?.emailAddress?.name||"?"}\nTipo: ${email.isDirect?"Email direto":"Em cópia"}\nAssunto: ${email.subject||"(sem assunto)"}\nMensagem: ${(email.bodyPreview||"").slice(0,500)}`,
        null,cfg.geminiKey
      );
      setAi(JSON.parse(txt.replace(/```[a-z]*|```/g,"").trim()));
    }catch{setAi({resumo:"Resumo não disponível.",urgencia:"media",tipo:"outro",acao:"guardar"});}
    setAiLoading(false);
  };

  const advance=async(n)=>{
    setProcessed(p=>p+1);setAi(null);setTaskDone(false);
    if(n>=emails.length){setScreen("done");return;}
    setIdx(n);setScreen("emails");summarize(emails[n]);
  };

  const gApi=async(fn)=>{if(!demo)try{await fn();}catch{}};

  const doArchive=async()=>{
    setActLoading(true);
    await gApi(()=>fetch(`${GRAPH}/me/messages/${emails[idx].id}/move`,{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({destinationId:"archive"})}));
    setActLoading(false);advance(idx+1);
  };
  const doDelete=async()=>{
    setActLoading(true);
    await gApi(()=>fetch(`${GRAPH}/me/messages/${emails[idx].id}`,{method:"DELETE",headers:{Authorization:`Bearer ${token}`}}));
    setActLoading(false);advance(idx+1);
  };
  const openEmail=()=>{const w=emails[idx]?.webLink;if(w&&w!=="#")window.open(w,"_blank");};

  const doAsana=async()=>{
    if(!cfg.asanaProjectGid||!cfg.asanaToken){setError("Configura o Asana nas definições.");return;}
    setActLoading(true);
    try{
      const em=emails[idx];
      await fetch("https://app.asana.com/api/1.0/tasks",{
        method:"POST",
        headers:{Authorization:`Bearer ${cfg.asanaToken}`,"Content-Type":"application/json",Accept:"application/json"},
        body:JSON.stringify({data:{name:`📧 ${em.subject}`,notes:`De: ${em.from?.emailAddress?.name} <${em.from?.emailAddress?.address}>\nData: ${new Date(em.receivedDateTime).toLocaleDateString("pt-PT")}\nPrioridade: ${em.isDirect?"Email direto":"Em cópia"}\n\n${ai?.resumo||em.bodyPreview?.slice(0,400)||""}`,projects:[cfg.asanaProjectGid]}})
      });
      setTaskDone(true);
    }catch(e){setError("Erro Asana: "+e.message);}
    setActLoading(false);
  };

  const startReply=async(mode)=>{
    if(!cfg.geminiKey){setError("Chave Gemini em falta nas definições.");return;}
    setReplyMode(mode);setScreen("reply");setReplyLoading(true);setReplyText("");
    const em=emails[idx];
    try{
      const prompt=mode==="fiscal"
        ?`Redige uma resposta profissional e fundamentada para este email fiscal:\n\nDe: ${em.from?.emailAddress?.name}\nAssunto: ${em.subject}\nMensagem: ${(em.bodyPreview||"").slice(0,600)}\n\nFundamenta com legislação fiscal portuguesa aplicável, informações vinculativas da AT e orientações da OCC.`
        :`Escreve uma resposta profissional em português para este email. Apenas o corpo:\n\nDe: ${em.from?.emailAddress?.name}\nAssunto: ${em.subject}\nMensagem: ${(em.bodyPreview||"").slice(0,500)}`;
      const txt=await callGemini(prompt,mode==="fiscal"?FISCAL_SYSTEM:null,cfg.geminiKey);
      setReplyText(txt);
    }catch(e){setReplyText("");setError("Erro Gemini: "+e.message);}
    setReplyLoading(false);
  };

  const sendReply=async()=>{
    setActLoading(true);
    await gApi(()=>fetch(`${GRAPH}/me/messages/${emails[idx].id}/reply`,{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({message:{body:{contentType:"Text",content:replyText}}})}));
    setActLoading(false);setReplyText("");advance(idx+1);
  };

  const email=emails[idx];
  const total=emails.length;
  const W={minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:16};
  const C=(x={})=>({background:"#FFF",borderRadius:24,width:"100%",maxWidth:500,boxShadow:"0 8px 40px rgba(0,0,0,0.10)",overflow:"hidden",...x});

  // ── SETUP ───────────────────────────────────────────────────────
  if(screen==="setup")return(
    <div style={W}>
      <div style={C()}>
        <div style={{background:"#1C1917",padding:"22px 28px",textAlign:"center"}}>
          <div style={{fontSize:38,marginBottom:5}}>📬</div>
          <h1 style={{fontFamily:"Fraunces,serif",fontSize:21,fontWeight:300,color:"#FFF",margin:0}}>Gestor de Correio</h1>
          <p style={{color:"#A8A29E",fontSize:11,marginTop:3}}>Outlook · Gemini (gratuito) · Asana</p>
        </div>
        <div style={{padding:"18px 22px 22px"}}>
          <button onClick={startDemo} style={{width:"100%",background:"#F0FDF4",border:"2px solid #BBF7D0",borderRadius:11,padding:11,fontFamily:"Nunito",fontWeight:700,fontSize:13,color:"#15803D",cursor:"pointer",marginBottom:16}}>
            🎯 Experimentar com emails de demonstração
          </button>
          {/* Tabs */}
          <div style={{display:"flex",gap:3,marginBottom:16,background:"#F3F0EB",borderRadius:11,padding:3}}>
            {[["ms","📧 Outlook"],["ai","🤖 Gemini"],["asana","📋 Asana"]].map(([k,l])=>(
              <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"7px 3px",border:"none",borderRadius:8,cursor:"pointer",fontFamily:"Nunito",fontWeight:700,fontSize:11,background:tab===k?"#FFF":"transparent",color:tab===k?"#1C1917":"#78716C",boxShadow:tab===k?"0 1px 6px rgba(0,0,0,0.07)":"none"}}>{l}</button>
            ))}
          </div>

          {tab==="ms"&&<div>
            <p style={{fontSize:12,color:"#78716C",marginBottom:8,lineHeight:1.6}}>Client ID pré-configurado. Após deploy no Netlify, adiciona o URL como <strong>Redirect URI (SPA)</strong> no Azure.</p>
            <label style={{display:"block",fontWeight:700,fontSize:12,color:"#44403C",marginBottom:4}}>Microsoft Client ID</label>
            <input value={cfg.clientId} onChange={e=>save({...cfg,clientId:e.target.value})} style={{marginBottom:10}}/>
            <div style={{background:"#F0F9FF",borderRadius:9,padding:"9px 11px",fontSize:11,color:"#0369A1"}}>
              <strong>URL para adicionar no Azure:</strong><br/>
              <code style={{fontFamily:"monospace",fontSize:10,wordBreak:"break-all"}}>{window.location.href.split("?")[0].split("#")[0]}</code>
            </div>
          </div>}

          {tab==="ai"&&<div>
            <div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:9,padding:"10px 12px",marginBottom:10,fontSize:12,color:"#15803D"}}>
              <strong>✅ Gratuito!</strong> O Gemini 2.0 Flash é grátis até 1500 pedidos/dia — mais que suficiente.
            </div>
            <p style={{fontSize:12,color:"#78716C",marginBottom:8,lineHeight:1.6}}>
              Obtém a chave em <a href="https://aistudio.google.com/apikey" target="_blank" style={{color:"#B45309",fontWeight:700}}>aistudio.google.com/apikey</a> → "Create API key" (não precisa de cartão).
            </p>
            <label style={{display:"block",fontWeight:700,fontSize:12,color:"#44403C",marginBottom:4}}>Chave API Gemini</label>
            <input type="password" value={cfg.geminiKey} onChange={e=>save({...cfg,geminiKey:e.target.value})} placeholder="AIza..."/>
          </div>}

          {tab==="asana"&&<div>
            <p style={{fontSize:12,color:"#78716C",marginBottom:8,lineHeight:1.6}}>
              Token em <a href="https://app.asana.com/0/my-apps" target="_blank" style={{color:"#B45309",fontWeight:700}}>app.asana.com/0/my-apps</a> → Personal access tokens → New token.
            </p>
            <label style={{display:"block",fontWeight:700,fontSize:12,color:"#44403C",marginBottom:4}}>Asana Personal Access Token</label>
            <input value={cfg.asanaToken} onChange={e=>save({...cfg,asanaToken:e.target.value})} placeholder="1/xxxxx..." style={{marginBottom:8}}/>
            <button onClick={()=>loadAsana(cfg.asanaToken)} disabled={!cfg.asanaToken||asanaLoading} style={{width:"100%",background:"#1C1917",color:"#FFF",border:"none",borderRadius:9,padding:"9px",fontFamily:"Nunito",fontWeight:700,fontSize:12,cursor:"pointer",marginBottom:8,opacity:!cfg.asanaToken?0.4:1}}>
              {asanaLoading?"A carregar...":"Carregar projetos"}
            </button>
            {asanaProjects.length>0&&<div>
              <label style={{display:"block",fontWeight:700,fontSize:12,color:"#44403C",marginBottom:4}}>Projeto</label>
              <select value={cfg.asanaProjectGid} onChange={e=>save({...cfg,asanaProjectGid:e.target.value,asanaProjectName:e.target.options[e.target.selectedIndex].text})}>
                <option value="">Selecionar projeto...</option>
                {asanaProjects.map(p=><option key={p.gid} value={p.gid}>{p.name}</option>)}
              </select>
            </div>}
          </div>}

          {error&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:9,padding:"9px 12px",margin:"12px 0 0",color:"#991B1B",fontSize:12,fontWeight:600}}>⚠ {error}</div>}

          <button onClick={login} disabled={actLoading} style={{width:"100%",background:actLoading?"#6B7280":"#1C1917",color:"#FFF",border:"none",borderRadius:12,padding:14,fontSize:15,fontWeight:800,fontFamily:"Nunito",cursor:actLoading?"wait":"pointer",marginTop:16}}>
            {actLoading?"A entrar...":"🔐 Entrar com Microsoft"}
          </button>
          <p style={{textAlign:"center",fontSize:10,color:"#C4B5A0",marginTop:8}}>Os emails nunca são guardados. Tudo é processado localmente.</p>
        </div>
      </div>
    </div>
  );

  // ── LOADING ─────────────────────────────────────────────────────
  if(screen==="loading")return(
    <div style={W}><div style={{...C(),padding:40,textAlign:"center"}}><div style={{fontSize:44,marginBottom:12}}>⏳</div><h2 style={{fontFamily:"Fraunces,serif",fontWeight:300,color:"#1C1917",margin:0}}>A carregar emails...</h2></div></div>
  );

  // ── EMAIL ────────────────────────────────────────────────────────
  if(screen==="emails"&&email){
    const fn=email.from?.emailAddress?.name||email.from?.emailAddress?.address||"?";
    const fa=email.from?.emailAddress?.address||"";
    const dt=new Date(email.receivedDateTime).toLocaleDateString("pt-PT",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
    const acMap={arquivar:"Arquivar",responder:"Responder",responder_fiscal:"Resp. Fiscal",tarefa:"Criar Tarefa",guardar:"Guardar"};
    return(
      <div style={W}>
        {demo&&<div style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:10,padding:"6px 14px",marginBottom:10,fontSize:11,color:"#92400E",fontWeight:700,maxWidth:500,width:"100%",textAlign:"center"}}>🎯 Modo demonstração — emails não são reais</div>}
        <div style={C()}>
          <div style={{padding:"13px 18px 0"}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#A8A29E",fontWeight:700,marginBottom:4}}>
              <span>📬 {idx+1} / {total}</span><span>{processed} tratados</span>
            </div>
            <div style={{background:"#F3F0EB",borderRadius:99,height:4}}><div style={{background:"#1B4332",borderRadius:99,height:4,width:`${(idx/total)*100}%`,transition:"width 0.4s"}}/></div>
          </div>
          <div style={{padding:"12px 18px 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <Avatar name={fn}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:800,fontSize:13,color:"#1C1917",display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>{fn} <PBadge d={email.isDirect}/></div>
                <div style={{fontSize:10,color:"#A8A29E",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fa} · {dt}</div>
              </div>
            </div>
            <h2 style={{fontFamily:"Fraunces,serif",fontSize:17,fontWeight:400,color:"#1C1917",margin:"0 0 9px",lineHeight:1.3}}>{email.subject||"(sem assunto)"}</h2>
            <div style={{background:"#FAFAF9",borderRadius:9,padding:"9px 11px",fontSize:12.5,color:"#44403C",lineHeight:1.7,marginBottom:10,borderLeft:"3px solid #E8E0D5"}}>{email.bodyPreview||"Sem pré-visualização."}</div>
            {aiLoading
              ?<div style={{background:"#F0FDF4",borderRadius:9,padding:"9px 11px",marginBottom:12,fontSize:12,color:"#78716C",display:"flex",alignItems:"center",gap:7}}>🤖 A analisar com Gemini...</div>
              :ai?<div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:9,padding:"9px 11px",marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <span style={{fontSize:10,fontWeight:800,color:"#15803D",textTransform:"uppercase",letterSpacing:0.5}}>🤖 Gemini</span>
                  <UBadge u={ai.urgencia}/>
                </div>
                <p style={{margin:0,fontSize:12.5,color:"#1C1917",lineHeight:1.6}}>{ai.resumo}</p>
                {ai.acao&&<p style={{margin:"4px 0 0",fontSize:11,color:"#15803D",fontWeight:700}}>💡 Sugestão: {acMap[ai.acao]||ai.acao}</p>}
              </div>:null}
            <div style={{display:"flex",gap:5,marginBottom:5}}>
              <Btn onClick={doArchive} disabled={actLoading} bg="#1B4332" icon="🗂️" label="Arquivar"/>
              <Btn onClick={()=>startReply("general")} disabled={actLoading} bg="#1E3A5F" icon="↩️" label="Responder"/>
              <Btn onClick={()=>startReply("fiscal")} disabled={actLoading} bg="#4A1D96" icon="⚖️" label="Resp. Fiscal"/>
            </div>
            <div style={{display:"flex",gap:5}}>
              <Btn onClick={doAsana} disabled={actLoading||!cfg.asanaProjectGid} bg={taskDone?"#1B4332":"#78350F"} icon={taskDone?"✅":"📋"} label={taskDone?"Criado!":"Asana"} small/>
              <Btn onClick={openEmail} disabled={!email.webLink||email.webLink==="#"} bg="#374151" icon="🔗" label="Abrir" small/>
              <Btn onClick={doDelete} disabled={actLoading} bg="#7F1D1D" icon="🗑️" label="Apagar" small/>
              <Btn onClick={()=>advance(idx+1)} disabled={actLoading} bg="#E5E7EB" color="#374151" icon="⏭️" label="Saltar" small/>
            </div>
            {error&&<div style={{background:"#FEF2F2",borderRadius:9,padding:"8px 11px",marginTop:10,color:"#991B1B",fontSize:11,fontWeight:600}}>⚠ {error} <button onClick={()=>setError("")} style={{background:"none",border:"none",cursor:"pointer",color:"#991B1B",fontWeight:800,float:"right"}}>✕</button></div>}
          </div>
        </div>
      </div>
    );
  }

  // ── REPLY ────────────────────────────────────────────────────────
  if(screen==="reply"){
    const em=emails[idx];
    const isFiscal=replyMode==="fiscal";
    return(
      <div style={W}>
        <div style={C()}>
          <div style={{background:isFiscal?"#4A1D96":"#1E3A5F",padding:"16px 22px"}}>
            <h2 style={{fontFamily:"Fraunces,serif",fontWeight:300,fontSize:17,color:"#FFF",margin:0}}>{isFiscal?"⚖️ Agente Fiscal":"↩️ Responder"}</h2>
            <p style={{color:isFiscal?"#C4B5FD":"#93C5FD",fontSize:11,margin:"3px 0 0"}}>Para: {em?.from?.emailAddress?.name||em?.from?.emailAddress?.address}{isFiscal?" · IVA · IRC · IRS · IMT · CE":""}</p>
          </div>
          {isFiscal&&<div style={{background:"#F5F3FF",borderLeft:"3px solid #7C3AED",padding:"8px 13px",fontSize:11,color:"#4A1D96",fontWeight:600}}>
            Fundamentada em: CIVA · CIRC · CIRS · CIMT · CDTs · Inf. Vinculativas AT · Pareceres OCC
          </div>}
          <div style={{padding:18}}>
            {replyLoading
              ?<div style={{textAlign:"center",padding:"32px 0",color:"#78716C",fontSize:13}}>
                <div style={{fontSize:26,marginBottom:7}}>{isFiscal?"⚖️":"🤖"}</div>
                {isFiscal?"A consultar legislação fiscal e redigir resposta fundamentada...":"A gerar resposta com Gemini..."}
              </div>
              :<textarea value={replyText} onChange={e=>setReplyText(e.target.value)} style={{minHeight:200}}/>}
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button onClick={()=>setScreen("emails")} style={{flex:1,background:"#F3F4F6",color:"#374151",border:"none",borderRadius:11,padding:11,fontFamily:"Nunito",fontWeight:700,fontSize:12,cursor:"pointer"}}>← Voltar</button>
              <button onClick={sendReply} disabled={replyLoading||actLoading||!replyText.trim()} style={{flex:2,background:isFiscal?"#4A1D96":"#1E3A5F",color:"#FFF",border:"none",borderRadius:11,padding:11,fontFamily:"Nunito",fontWeight:800,fontSize:12,cursor:"pointer",opacity:replyLoading||!replyText.trim()?0.5:1}}>
                {actLoading?"A enviar...":"📤 Enviar Resposta"}
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── DONE ─────────────────────────────────────────────────────────
  return(
    <div style={W}>
      <div style={{...C(),padding:34,textAlign:"center"}}>
        <div style={{fontSize:52,marginBottom:10}}>✅</div>
        <h1 style={{fontFamily:"Fraunces,serif",fontWeight:300,fontSize:24,color:"#1C1917",margin:0}}>Caixa limpa!</h1>
        <p style={{color:"#78716C",fontSize:13,margin:"8px 0 22px"}}>Trataste de <strong>{processed}</strong> email{processed!==1?"s":""}.</p>
        <button onClick={()=>{if(demo)startDemo();else loadEmails(token,myEmail);}} style={{width:"100%",background:"#1C1917",color:"#FFF",border:"none",borderRadius:12,padding:13,fontFamily:"Nunito",fontWeight:800,fontSize:14,cursor:"pointer",marginBottom:8}}>
          🔄 {demo?"Reiniciar demonstração":"Verificar novos emails"}
        </button>
        <button onClick={()=>{setScreen("setup");msalInst=null;}} style={{background:"none",border:"none",color:"#A8A29E",fontSize:11,fontFamily:"Nunito",cursor:"pointer",fontWeight:600}}>⚙ Definições</button>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
